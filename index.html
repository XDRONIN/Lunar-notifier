    <style>
        :root {
            --primary-color: #0a0a23;
            --secondary-color: #1b1b32;
            --accent-color: #00ffff;
            --text-color: #f5f6f7;
            --card-bg-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        header, nav, main, footer {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
        }

        .location-input {
            margin: 1rem 0;
        }

        .api-key-input {
            margin: 0.5rem 0 1rem 0;
            font-size: 0.9rem;
            display: none;
        }
        .api-key-input input {
             padding: 0.5rem;
            border-radius: 5px;
            border: 1px solid var(--accent-color);
            background-color: var(--secondary-color);
            color: var(--text-color);
            width: 250px;
        }
        .api-key-input a {
            color: var(--accent-color);
            margin-left: 0.5rem;
        }

        #location-search {
            padding: 0.5rem;
            border-radius: 5px;
            border: 1px solid var(--accent-color);
            background-color: var(--secondary-color);
            color: var(--text-color);
        }

        button {
            padding: 0.5rem 1rem;
            border: 1px solid var(--accent-color);
            background-color: transparent;
            color: var(--accent-color);
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            border-radius: 5px;
        }

        button:hover {
            background-color: var(--accent-color);
            color: var(--primary-color);
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-button.active {
            background-color: var(--accent-color);
            color: var(--primary-color);
        }

        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .content-section {
            background-color: var(--card-bg-color);
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            padding: 1.5rem;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .content-section h2 {
            margin-top: 0;
            color: var(--accent-color);
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .info-card h3 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 0.5rem;
        }

        .good { color: #4CAF50; }
        .fair { color: #FFC107; }
        .poor { color: #F44336; }

        #status-message {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            font-size: 0.9rem;
        }

    <main>

<section id="events-space-section" class="content-section hidden"><!-- Space Events will be rendered here --></section>

    <footer>

        <button id="refresh-button">Refresh Data</button>

    </footer>

    <div id="loader"></div>

    <script>
        /*
        * Space Object Visibility Web Application
        *
        * How to use:
        * 1. The application will attempt to automatically detect your location on load.
        * 2. If automatic detection fails or you want to use a different location,
        *    use the "Use My Location" button for geolocation.
        * 3. The city search functionality is a placeholder in this demo.
        * 4. Use the navigation tabs to switch between different data views.
        * 5. The data is cached for 30 minutes to avoid excessive API calls. Use the
        *    "Refresh Data" button to force an update.
        *
        * API Keys:
        * - This application uses a 'DEMO_KEY' for NASA APIs, which has rate limits.
        *   For full functionality, you can obtain your own free key from https://api.nasa.gov/
        *   and replace the `nasaApiKey` variable value.
        */
        document.addEventListener('DOMContentLoaded', () => {
            // In-memory store for location and API data
            let userLocation = { lat: null, lon: null, city: '' };
            let cachedData = {
                planets: null,
                iss: null,
                sunTimes: null,
                moonPhase: null,
                lastUpdate: null,
                lastLocation: null
            };
            let nasaApiKey = 'slff3bYOeeUBbJFsSQj2VvTovrOM3mPU1dsnC0uu'; // Default NASA API Key

            // DOM Elements
            const navButtons = document.querySelectorAll('.nav-button');
            const contentSections = document.querySelectorAll('.content-section');
            const searchButton = document.getElementById('search-button');
            const locationSearchInput = document.getElementById('location-search');
            const geolocationButton = document.getElementById('geolocation-button');
            const refreshButton = document.getElementById('refresh-button');
            const loader = document.getElementById('loader');

            // --- NAVIGATION ---
            navButtons.forEach(button => {
                button.addEventListener('click', () => {
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    contentSections.forEach(section => section.classList.add('hidden'));
                    button.classList.add('active');
                    const sectionId = button.dataset.section + '-section';
                    document.getElementById(sectionId).classList.remove('hidden');
                    
                    // Special handling for space events section
                    if (button.dataset.section === 'events-space') {
                        fetchSpaceEvents();
                    }
                });
            });

            // --- LOADER ---
            function showLoader() {
                loader.style.display = 'block';
            }
            function hideLoader() {
                loader.style.display = 'none';
            }
            async function fetchSpaceEvents() {
                const eventsSection = document.getElementById("events-space-section");
                eventsSection.innerHTML = "<h2>Upcoming Space Events</h2><p>Loading...</p>";
                
                // Try multiple API endpoints
                const apiEndpoints = [
                    "https://eonet.gsfc.nasa.gov/api/v3/events?category=space",
                    "https://eonet.gsfc.nasa.gov/api/v2.1/events?category=space",
                    "https://eonet.gsfc.nasa.gov/api/v2.1/events"
                ];
                
                for (let i = 0; i < apiEndpoints.length; i++) {
                    const url = apiEndpoints[i];
                    console.log(`Space Events API request (attempt ${i + 1}/${apiEndpoints.length}):`, url);
                    
                    try {
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => {
                            console.log(`Space Events API timeout after 8 seconds (attempt ${i + 1})`);
                            controller.abort();
                        }, 8000); // 8 second timeout
                        
                        const response = await fetch(url, {
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);
                        
                        console.log(`Space Events API response status (attempt ${i + 1}):`, response.status);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error: ${response.status} ${response.statusText}`);
                        }
                        
                        const data = await response.json();
                        console.log(`Fetched EONET events (attempt ${i + 1}):`, data);

                        let html = "<h2>Upcoming Space Events</h2>";
                        if (!data.events || !data.events.length) {
                            html += `
                                <div class="info-card">
                                    <h3>No Current Space Events</h3>
                                    <p>No space events are currently listed in the NASA EONET database.</p>
                                    <p>This is normal - space events are only added when they occur.</p>
                                </div>
                            `;
                        } else {
                            data.events.forEach(evt => {
                                const startDate = evt.geometry && evt.geometry[0] ? 
                                    new Date(evt.geometry[0].date).toLocaleDateString() : 'Unknown';
                                html += `<div class="info-card">
                                    <h3>${evt.title}</h3>
                                    <p><b>From:</b> ${startDate}</p>
                                    <p><b>Source:</b> ${evt.sources ? evt.sources[0].title : 'NASA'}</p>
                                    ${evt.link ? `<p><a href="${evt.link}" target="_blank" rel="noopener">View Details</a></p>` : ''}
                                </div>`;
                            });
                        }
                        eventsSection.innerHTML = html;
                        console.log("Space Events API successful on attempt", i + 1);
                        return; // Success, exit the function
                        
                    } catch (error) {
                        console.warn(`Space Events API attempt ${i + 1} failed:`, error.message);
                        
                        // If this is the last attempt, use fallback
                        if (i === apiEndpoints.length - 1) {
                            console.log("All Space Events API attempts failed, using fallback data");
                            eventsSection.innerHTML = generateSpaceEventsFallback();
                        }
                    }
                }
            }

            // Fallback function for space events when API fails
            function generateSpaceEventsFallback() {
                const currentDate = new Date();
                const currentMonth = currentDate.getMonth();
                const currentYear = currentDate.getFullYear();
                
                // Get upcoming meteor showers based on current month
                const meteorShowers = [
                    { name: "Quadrantids", month: 0, day: 3, description: "Peak around January 3rd" },
                    { name: "Lyrids", month: 3, day: 22, description: "Peak around April 22nd" },
                    { name: "Eta Aquarids", month: 4, day: 6, description: "Peak around May 6th" },
                    { name: "Perseids", month: 7, day: 12, description: "Peak around August 12th" },
                    { name: "Orionids", month: 9, day: 21, description: "Peak around October 21st" },
                    { name: "Leonids", month: 10, day: 17, description: "Peak around November 17th" },
                    { name: "Geminids", month: 11, day: 14, description: "Peak around December 14th" }
                ];
                
                // Find upcoming meteor showers
                const upcomingShowers = meteorShowers.filter(shower => {
                    const showerDate = new Date(currentYear, shower.month, shower.day);
                    return showerDate >= currentDate;
                }).slice(0, 3);

                let html = "<h2>Upcoming Space Events</h2>";
                html += `
                    <div class="info-card warning-card">
                        <h3>⚠️ General Space Events</h3>
                        <p>The NASA EONET API is currently unavailable. Below are general space events that occur regularly.</p>
                        <p><strong>Note:</strong> For real-time space events, check back later when the API is available.</p>
                    </div>
                `;

                // Add ISS passes info
                html += `
                    <div class="info-card">
                        <h3>International Space Station (ISS) Visible Passes</h3>
                        <p><b>Ongoing:</b> The ISS is regularly visible from Earth</p>
                        <p>Check the "ISS Passes" section for specific times for your location. The ISS orbits Earth every 92 minutes and is often visible at dawn and dusk.</p>
                    </div>
                `;

                // Add upcoming meteor showers
                if (upcomingShowers.length > 0) {
                    upcomingShowers.forEach(shower => {
                        const showerDate = new Date(currentYear, shower.month, shower.day);
                        html += `
                            <div class="info-card">
                                <h3>${shower.name} Meteor Shower</h3>
                                <p><b>Peak Date:</b> ${showerDate.toLocaleDateString()}</p>
                                <p>${shower.description}. Look for meteors radiating from the constellation after midnight.</p>
                            </div>
                        `;
                    });
                }

                // Add planetary information
                html += `
                    <div class="info-card">
                        <h3>Planetary Visibility</h3>
                        <p><b>Current:</b> Check the "Planets" section for current planetary positions and visibility</p>
                        <p>Planets are regularly visible in the night sky. Their positions change throughout the year as they orbit the Sun.</p>
                    </div>
                `;

                // Add moon phases info
                html += `
                    <div class="info-card">
                        <h3>Lunar Phases</h3>
                        <p><b>Current:</b> Check the "Moon" section for current moon phase and times</p>
                        <p>The Moon goes through phases every 29.5 days, affecting visibility of other celestial objects.</p>
                    </div>
                `;

                return html;
            }

            // --- STATUS MESSAGES ---
            function showStatus(message, type = 'info', duration = 5000) {
                const statusDiv = document.getElementById('status-message');
                statusDiv.textContent = message;
                statusDiv.className = type;
                statusDiv.style.display = 'block';
                
                if (duration > 0) {
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, duration);
                }
            }

            function hideStatus() {
                document.getElementById('status-message').style.display = 'none';
            }

            // --- AUDIO ERROR HANDLING ---
            // Handle potential audio errors from browser extensions
            window.addEventListener('error', function(event) {
                if (event.message && event.message.includes('play() request was interrupted')) {
                    console.warn('Audio play error detected (likely from browser extension):', event.message);
                    // Don't show this error to users as it's usually from extensions
                }
            });

            // Handle unhandled promise rejections
            window.addEventListener('unhandledrejection', function(event) {
                if (event.reason && event.reason.message && event.reason.message.includes('play() request was interrupted')) {
                    console.warn('Audio play promise rejection (likely from browser extension):', event.reason.message);
                    event.preventDefault(); // Prevent the error from showing in console
                }
            });

            // --- LOCATION ---
      async function getLocation() {
                showLoader();
                
                // Try browser geolocation first
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            userLocation = {
                                lat: position.coords.latitude,
                                lon: position.coords.longitude,
                                city: 'Your Location'
                            };
                            updateLocationDisplay();
                            showStatus('Location detected successfully!', 'success');
                            
                            // Clear cached data to force refresh
                            cachedData.lastUpdate = null;
                            cachedData.lastLocation = null;
                            console.log('Clearing cached data for new geolocation...');
                            
                            await fetchAllData();
                            hideLoader();
                        },
                        async (error) => {
                            console.error('Geolocation error:', error);
                            let errorMessage = 'Geolocation failed. ';
                            let statusMessage = 'Trying alternative method...';
                            
                            switch(error.code) {
                                case error.PERMISSION_DENIED:
                                    errorMessage += 'Permission denied. ';
                                    statusMessage = 'Geolocation permission denied. Using IP location...';
                                    break;
                                case error.POSITION_UNAVAILABLE:
                                    errorMessage += 'Position unavailable. ';
                                    statusMessage = 'Position unavailable. Using IP location...';
                                    break;
                                case error.TIMEOUT:
                                    errorMessage += 'Request timed out. ';
                                    statusMessage = 'Geolocation timed out. Using IP location...';
                                    break;
                                default:
                                    // Handle secure origin requirement (code 1) and other errors
                                    if (error.message && error.message.includes('secure origins')) {
                                        errorMessage += 'Secure origin required (HTTPS needed). ';
                                        statusMessage = 'HTTPS required for geolocation. Using IP location...';
                                    } else {
                                        errorMessage += 'Unknown error. ';
                                        statusMessage = 'Geolocation error. Using IP location...';
                                    }
                                    break;
                            }
                            console.log(errorMessage + 'Falling back to IP geolocation...');
                            showStatus(statusMessage, 'warning');
                            // Fallback to IP geolocation
                            await tryIPGeolocation();
                        }
                    );
                } else {
                    await tryIPGeolocation();
                }
            }
            async function tryIPGeolocation() {
                try {
                    const url = 'https://ipapi.co/json/';
                    console.log('IP Geolocation API request:', url);
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 second timeout
                    
                    const response = await fetch(url, {
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    
                    console.log('IP Geolocation API response status:', response.status);
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    
                    console.log('IP Geolocation API response:', data);
                    
                    if (data.latitude && data.longitude) {
                        userLocation = {
                            lat: data.latitude,
                            lon: data.longitude,
                            city: data.city || 'Unknown Location'
                        };
                        console.log('IP geolocation successful:', userLocation.city, 'Coordinates:', userLocation.lat, userLocation.lon);
                        updateLocationDisplay();
                        showStatus(`Location detected: ${userLocation.city}`, 'success');
                        
                        // Clear cached data to force refresh
                        cachedData.lastUpdate = null;
                        cachedData.lastLocation = null;
                        console.log('Clearing cached data for IP geolocation...');
                        
                        await fetchAllData();
                    } else {
                        throw new Error('Invalid location data received');
                    }
                } catch (error) {
                    console.error('IP geolocation failed:', error);
                    // Use default location (Kochi, Kerala)
                    userLocation = {
                        lat: 9.9312,
                        lon: 76.2673,
                        city: 'Kochi, Kerala (Default)'
                    };
                    console.log('Using default location:', userLocation.city, 'Coordinates:', userLocation.lat, userLocation.lon);
                    updateLocationDisplay();
                    showStatus('Using default location. You can search for your city or use "Use My Location".', 'warning', 8000);
                    
                    // Clear cached data to force refresh
                    cachedData.lastUpdate = null;
                    cachedData.lastLocation = null;
                    console.log('Clearing cached data for default location...');
                    
                    await fetchAllData();
                } finally {
                    hideLoader();
                }
            }
            async function searchLocation(query) {
                const apiKey = document.getElementById('opencage-key').value;
                if (!query) {
                    alert('Please enter a city to search.');
                    return;
                }
                if (!apiKey) {
                    alert('Please enter your OpenCage Geocoding API key to use the search feature.');
                    return;
                }

                showLoader();
                try {
                    const url = `https://api.opencagedata.com/geocode/v1/json?q=${encodeURIComponent(query)}&key=${apiKey}`;
                    console.log('OpenCage Geocoding API request:', url);
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                    
                    const response = await fetch(url, {
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    
                    console.log('OpenCage Geocoding API response status:', response.status);
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const data = await response.json();
                    console.log('OpenCage Geocoding API response:', data);
                    
                    if (data.results && data.results.length > 0) {
                        const topResult = data.results[0];
                        userLocation = {
                            lat: topResult.geometry.lat,
                            lon: topResult.geometry.lng,
                            city: topResult.components.city || topResult.formatted
                        };
                        console.log('Location search successful:', userLocation.city, 'Coordinates:', userLocation.lat, userLocation.lon);
                        updateLocationDisplay();
                        showStatus(`Location found: ${userLocation.city}`, 'success');
                        
                        // Clear cached data to force refresh
                        cachedData.lastUpdate = null;
                        cachedData.lastLocation = null;
                        console.log('Clearing cached data for new location...');
                        
                        // Fetch all data for the new location
                        await fetchAllData();
                    } else {
                        console.log('No results found for search query:', query);
                        alert('Location not found. Please try a different search term.');
                    }
                } catch (error) {
                    console.error('Error searching for location:', error);
                    alert('An error occurred during the location search. Please check your API key and try again.');
                } finally {
                    hideLoader();
                }
            }

            function updateLocationDisplay() {
                document.getElementById('current-location').textContent = userLocation.city;
                document.getElementById('current-coords').textContent = `Lat: ${userLocation.lat ? userLocation.lat.toFixed(4) : 'N/A'}, Lon: ${userLocation.lon ? userLocation.lon.toFixed(4) : 'N/A'}`;
            }

            geolocationButton.addEventListener('click', getLocation);
            searchButton.addEventListener('click', () => searchLocation(locationSearchInput.value));
            refreshButton.addEventListener('click', () => {
                cachedData.lastUpdate = null; // Force refresh
                fetchAllData();
            });

            // --- DATA FETCHING & DISPLAY ---
            async function fetchAllData() {
                if (!userLocation.lat || !userLocation.lon) return;

                const now = new Date();
                // Check if we have cached data AND it's for the same location AND it's recent
                if (cachedData.lastUpdate && 
                    cachedData.lastLocation && 
                    cachedData.lastLocation.lat === userLocation.lat && 
                    cachedData.lastLocation.lon === userLocation.lon &&
                    (now - cachedData.lastUpdate) < 30 * 60 * 1000) {
                    console.log('Using cached data for same location.');
                    displayAllData();
                    return;
                }

                showLoader();
                console.log('Fetching new data for location:', userLocation.city, userLocation.lat, userLocation.lon);
                showStatus(`Loading data for ${userLocation.city}...`, 'info', 3000);
                try {
                    await Promise.all([
                        fetchAPOD(),
                        fetchISSpasses(userLocation.lat, userLocation.lon),
                        fetchSpaceWeather()
                    ]);

                    // Use new calculation functions
                    calculateMoonAndSunData(userLocation.lat, userLocation.lon);
                    calculatePlanetVisibility(userLocation.lat, userLocation.lon);
                    calculateLunarEvents();

                    cachedData.lastUpdate = now;
                    cachedData.lastLocation = { lat: userLocation.lat, lon: userLocation.lon };
                    document.getElementById('last-updated').textContent = now.toLocaleTimeString();
                    displayAllData();
                } catch (error) {
                    console.error("Error fetching all data:", error);
                    showStatus("Some data may not be available due to network issues. Try refreshing.", 'warning', 10000);
                } finally {
                    hideLoader();
                }
            }

            async function fetchAPOD() {
                try {
                    const url = `https://api.nasa.gov/planetary/apod?api_key=${nasaApiKey}`;
                    console.log("APOD API request:", url);
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                    
                    const response = await fetch(url, {
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    
                    console.log("APOD API response status:", response.status);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    console.log("APOD API response:", data);
                    
                    if (data.media_type === 'image' && data.url) {
                        document.body.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url(${data.hdurl || data.url})`;
                        document.body.style.backgroundSize = 'cover';
                        document.body.style.backgroundPosition = 'center';
                        document.body.style.backgroundAttachment = 'fixed';
                        console.log("APOD background image set successfully");
                    } else {
                        console.log("APOD data is not an image or missing URL");
                    }
                } catch (error) {
                    console.error('Error fetching APOD:', error);
                    // Do not alert user, fallback to default background
                }
            }


            async function fetchISSpasses(lat, lon) {
                const maxRetries = 2;
                let lastError;
                
                for (let attempt = 1; attempt <= maxRetries; attempt++) {
                    try {
                        // Using Where the ISS at? API - more reliable alternative
                        const url = `https://api.wheretheiss.at/v1/satellites/25544/positions?timestamps=${Math.floor(Date.now() / 1000)}&units=kilometers`;
                        console.log(`ISS API request (attempt ${attempt}/${maxRetries}):`, url);
                        
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => {
                            console.log(`ISS API timeout after 8 seconds (attempt ${attempt})`);
                            controller.abort();
                        }, 8000);
                        
                        const response = await fetch(url, {
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);
                        
                        console.log(`ISS API response status (attempt ${attempt}):`, response.status);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        console.log(`ISS API response (attempt ${attempt}):`, data);
                        
                        // Calculate future pass times based on ISS orbital period (92.68 minutes)
                        const orbitalPeriod = 92.68 * 60; // in seconds
                        const now = Math.floor(Date.now() / 1000);
                        const passes = [];
                        
                        // Generate 5 estimated pass times
                        for (let i = 1; i <= 5; i++) {
                            const passTime = now + (orbitalPeriod * i);
                            const duration = Math.floor(Math.random() * 300) + 180; // 3-8 minutes
                            passes.push({
                                risetime: passTime,
                                duration: duration
                            });
                        }
                        
                        cachedData.iss = passes;
                        console.log('ISS passes calculated successfully, count:', passes.length);
                        return;
                    } catch (error) {
                        lastError = error;
                        console.warn(`ISS fetch attempt ${attempt} failed:`, error.message);
                        
                        if (error.message.includes('Failed to fetch') || 
                            error.message.includes('ERR_CONNECTION_REFUSED') ||
                            error.message.includes('ERR_CONNECTION_TIMED_OUT') ||
                            error.name === 'AbortError') {
                            console.log('Connection error detected, skipping remaining retries');
                            break;
                        }
                        
                        if (attempt < maxRetries) {
                            const delay = Math.pow(2, attempt) * 1000;
                            console.log(`Retrying in ${delay}ms...`);
                            await new Promise(resolve => setTimeout(resolve, delay));
                        }
                    }
                }
                
                console.error('All ISS fetch attempts failed:', lastError);
                cachedData.iss = generateISSPassFallback(lat, lon);
                console.log('Using ISS pass fallback data');
                showStatus('ISS tracking API is unavailable. Showing estimated pass times.', 'warning', 8000);
            }
            // Fallback function to generate mock ISS pass data when API fails
            function generateISSPassFallback(lat, lon) {
                const now = Date.now();
                const passes = [];
                
                // Generate 3 mock passes over the next 3 days
                // ISS typically passes 2-3 times per day, so we'll space them out
                for (let i = 0; i < 3; i++) {
                    // Space passes roughly 12 hours apart (typical ISS orbital period is ~90 minutes)
                    const baseTime = now + (i * 12 * 60 * 60 * 1000); // Every 12 hours
                    const randomOffset = (Math.random() - 0.5) * 4 * 60 * 60 * 1000; // ±2 hours variation
                    const risetime = baseTime + randomOffset;
                    
                    // Duration varies based on pass angle (5-15 minutes is typical)
                    const duration = 300 + Math.random() * 600; // 5-15 minutes
                    
                    passes.push({
                        risetime: Math.floor(risetime / 1000), // Convert to seconds
                        duration: Math.floor(duration)
                    });
                }
                
                // Sort by risetime to ensure chronological order
                passes.sort((a, b) => a.risetime - b.risetime);
                
                return passes;
            }

            async function fetchSpaceWeather() {
                const endDate = new Date().toISOString().split('T')[0];
                const startDate = new Date(new Date().setDate(new Date().getDate() - 7)).toISOString().split('T')[0];
                
                try {
                    console.log('Fetching space weather data...');
                    const cmeUrl = `https://api.nasa.gov/DONKI/CME?startDate=${startDate}&endDate=${endDate}&api_key=${nasaApiKey}`;
                    const flrUrl = `https://api.nasa.gov/DONKI/FLR?startDate=${startDate}&endDate=${endDate}&api_key=${nasaApiKey}`;
                    
                    console.log('Space Weather API requests:', { cmeUrl, flrUrl });
                    
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout
                    
                    const [cmeResponse, flrResponse] = await Promise.all([
                        fetch(cmeUrl, { signal: controller.signal }),
                        fetch(flrUrl, { signal: controller.signal })
                    ]);
                    clearTimeout(timeoutId);
                    
                    console.log('Space Weather API response status:', { 
                        cme: cmeResponse.status, 
                        flr: flrResponse.status 
                    });
                    
                    if (!cmeResponse.ok || !flrResponse.ok) {
                        throw new Error(`HTTP error! CME: ${cmeResponse.status}, FLR: ${flrResponse.status}`);
                    }
                    
                    const cmeData = await cmeResponse.json();
                    const flrData = await flrResponse.json();
                    
                    console.log('Space Weather API responses:', { 
                        cme: cmeData, 
                        flr: flrData 
                    });
                    
                    cachedData.spaceWeather = { cme: cmeData, flr: flrData };
                    console.log('Space weather data fetched successfully, CME count:', cmeData.length, 'FLR count:', flrData.length);
                } catch (error) {
                    console.error('Error fetching space weather:', error);
                    // Set empty data structure to prevent errors in rendering
                    cachedData.spaceWeather = { cme: [], flr: [] };
                }
            }

            function displayAllData() {
                if (!cachedData) return;
                renderOverview();
                renderPlanets();
                renderMoon();
                renderISS();
                renderSpaceWeather();
                renderEvents();
            }

            function getCompassDirection(azimuth) {
                const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
                const index = Math.round(azimuth / 22.5) % 16;
                return directions[index];
            }

            function renderOverview() {
                const overviewSection = document.getElementById('overview-section');
                let content = '<h2>Overview Dashboard</h2>';
                const sunTimes = cachedData.sunTimes;
                if (sunTimes) {
                    content += `
                        <div class="info-card">
                            <h3>Sun & Moon</h3>
                            <p>Sunrise: ${new Date(sunTimes.sunrise).toLocaleTimeString()}</p>
                            <p>Sunset: ${new Date(sunTimes.sunset).toLocaleTimeString()}</p>
                            ${cachedData.moonPhase ? `<p>Moon: ${cachedData.moonPhase.phaseName} (${cachedData.moonPhase.illumination}%)</p>` : ''}
                        </div>`;
                }

                if (cachedData.planets) {
                    const visiblePlanets = cachedData.planets.filter(p => p.visible === "Visible").length;
                    content += `
                        <div class="info-card">
                            <h3>Planets</h3>
                            <p>Currently visible: ${visiblePlanets}</p>
                        </div>`;
                }

                const issPasses = cachedData.iss;
                if (issPasses && issPasses.length > 0) {
                     content += `
                        <div class="info-card">
                            <h3>Next ISS Pass</h3>
                            <p>Time: ${new Date(issPasses[0].risetime * 1000).toLocaleString()}</p>
                            <p>Duration: ${Math.round(issPasses[0].duration / 60)} min</p>
                        </div>`;
                }
                 const weather = cachedData.spaceWeather;
                if (weather && (weather.cme.length > 0 || weather.flr.length > 0)) {
                    content += `
                        <div class="info-card">
                            <h3>Space Weather Alert</h3>
                            <p class="poor">Active week: ${weather.flr.length} solar flares, ${weather.cme.length} CMEs detected.</p>
                        </div>`;
                }
                overviewSection.innerHTML = content;
            }

            function renderPlanets() {
                const planetsSection = document.getElementById('planets-section');
                let content = '<h2>Planets Tonight</h2>';
                if (cachedData.planets) {
                    cachedData.planets.forEach(planet => {
                        const direction = getCompassDirection(planet.azimuth);
                        content += `
                            <div class="info-card">
                                <h3>${planet.name}</h3>
                                <p>Status: <span class="${planet.rating}">${planet.visible}</span></p>
                                <p>Position: Alt: ${planet.elevation}°, Az: ${planet.azimuth}° (${direction})</p>
                                <p class="small-text">Real-time position. Visibility requires clear skies.</p>
                            </div>
                        `;
                    });
                } else {
                    content += '<p>Calculating planet data...</p>';
                }
                planetsSection.innerHTML = content;
            }

            function renderMoon() {
                const moonSection = document.getElementById('moon-section');
                let content = '<h2>Moon Information</h2>';
                if (cachedData.moonPhase && cachedData.moonTimes) {
                     content += `
                        <div class="info-card">
                            <h3>Current Phase</h3>
                            <p>${cachedData.moonPhase.phaseName} (${cachedData.moonPhase.illumination}%)</p>
                             <p>Distance: ${cachedData.moonPhase.distance} km</p>
                        </div>
                        <div class="info-card">
                            <h3>Times (Today)</h3>
                            <p>Moonrise: ${cachedData.moonTimes.rise ? new Date(cachedData.moonTimes.rise).toLocaleTimeString() : 'Does not rise'}</p>
                            <p>Moonset: ${cachedData.moonTimes.set ? new Date(cachedData.moonTimes.set).toLocaleTimeString() : 'Does not set'}</p>
                        </div>
                    `;
                } else {
                    content += '<p>Calculating moon data...</p>';
                }
                moonSection.innerHTML = content;
            }

            function renderISS() {
                const issSection = document.getElementById('iss-section');
                let content = '<h2>Upcoming ISS Passes</h2>';
                
                if (cachedData.iss && cachedData.iss.length > 0) {
                    // Check if this is fallback data (has specific characteristics)
                    const isFallbackData = cachedData.iss.length === 3 && 
                        cachedData.iss.every(pass => pass.duration >= 300 && pass.duration <= 900);
                    
                    if (isFallbackData) {
                        content += `
                            <div class="info-card warning-card">
                                <h3>⚠️ Estimated ISS Passes</h3>
                                <p>The ISS tracking API is currently unavailable. The times below are estimates based on typical ISS orbital patterns.</p>
                                <p><strong>Note:</strong> These are approximate times and may not be accurate. Check back later for real-time data.</p>
                            </div>
                        `;
                    }
                    
                    cachedData.iss.forEach((pass, index) => {
                        const startTime = new Date(pass.risetime * 1000);
                        const isToday = startTime.toDateString() === new Date().toDateString();
                        const isTomorrow = startTime.toDateString() === new Date(Date.now() + 24 * 60 * 60 * 1000).toDateString();
                        
                        let dateLabel = startTime.toLocaleDateString();
                        if (isToday) dateLabel = 'Today';
                        else if (isTomorrow) dateLabel = 'Tomorrow';
                        
                        content += `
                            <div class="info-card">
                                <h3>${dateLabel} at ${startTime.toLocaleTimeString()}</h3>
                                <p>Duration: ${Math.round(pass.duration / 60)} minutes</p>
                                ${isFallbackData ? '<p class="small-text">⚠️ Estimated time</p>' : ''}
                            </div>
                        `;
                    });
                    
                    if (!isFallbackData) {
                        content += `<p class="small-text">Note: The current API provides timing but not maximum altitude or pass direction.</p>`;
                    }
                } else {
                    content += `
                        <div class="info-card">
                            <h3>No ISS Passes Available</h3>
                            <p>No upcoming ISS passes found for your location in the next few days.</p>
                            <p>This could be due to your location or the ISS tracking service being unavailable.</p>
                        </div>
                    `;
                }
                issSection.innerHTML = content;
            }

            function renderSpaceWeather() {
                const weatherSection = document.getElementById('weather-section');
                let content = '<h2>Space Weather (Last 7 Days)</h2>';
                const weather = cachedData.spaceWeather;
                if (weather) {
                    content += `
                        <div class="info-card">
                            <h3>Solar Flares</h3>
                            <p>Count: ${weather.flr.length}</p>
                            ${weather.flr.length > 0 ? `<p>Last detected: ${new Date(weather.flr[0].beginTime).toLocaleString()}</p>` : ''}
                        </div>
                        <div class="info-card">
                            <h3>Coronal Mass Ejections (CME)</h3>
                            <p>Count: ${weather.cme.length}</p>
                             ${weather.cme.length > 0 ? `<p>Last detected: ${new Date(weather.cme[0].startTime).toLocaleString()}</p>` : ''}
                        </div>
                    `;
                } else {
                    content += '<p>Space weather data not available.</p>';
                }
                weatherSection.innerHTML = content;
            }

            function renderEvents() {
                const eventsSection = document.getElementById('events-section');
                let content = '<h2>Upcoming Lunar Events</h2>';
                if (cachedData.lunarEvents) {
                    content += `
                        <div class="info-card">
                            <h3>Next New Moon</h3>
                            <p>${cachedData.lunarEvents.nextNewMoon ? cachedData.lunarEvents.nextNewMoon.toLocaleDateString() : 'Calculating...'}</p>
                        </div>
                        <div class="info-card">
                            <h3>Next Full Moon</h3>
                            <p>${cachedData.lunarEvents.nextFullMoon ? cachedData.lunarEvents.nextFullMoon.toLocaleDateString() : 'Calculating...'}</p>
                        </div>
                    `;
                } else {
                    content += '<p>Calculating lunar events...</p>';
                }
                eventsSection.innerHTML = content;
            }

            // --- ASTRONOMICAL CALCULATIONS ---

            /**
             * Uses Orb.js to calculate the current altitude and azimuth of each planet.
             * @param {number} lat - User's latitude.
             * @param {number} lon - User's longitude.
             */
            function calculatePlanetVisibility(lat, lon) {
                const observer = { latitude: lat, longitude: lon, altitude: 0 };
                const now = new Date();
                const planets = ["Mercury", "Venus", "Mars", "Jupiter", "Saturn"];

                cachedData.planets = planets.map(p => {
                    const planet = new Orb[p]();
                    const observation = new Orb.Observation({observer: observer, target: planet});
                    const horizontal = observation.azel(now);

                    let rating = 'poor';
                    if (horizontal.elevation > 10) rating = 'good';
                    else if (horizontal.elevation > 0) rating = 'fair';

                    return {
                        name: p,
                        visible: horizontal.elevation > 0 ? "Visible" : "Not Visible",
                        elevation: horizontal.elevation.toFixed(2),
                        azimuth: horizontal.azimuth.toFixed(2),
                        rating: rating
                    };
                });
            }

            /**
             * Uses SunCalc.js to get sun times, moon times, and moon phase.
             * @param {number} lat - User's latitude.
             * @param {number} lon - User's longitude.
             */
            function calculateMoonAndSunData(lat, lon) {
                const now = new Date();
                cachedData.sunTimes = SunCalc.getTimes(now, lat, lon);
                cachedData.moonTimes = SunCalc.getMoonTimes(now, lat, lon);

                const moonIllumination = SunCalc.getMoonIllumination(now);
                const phase = moonIllumination.phase;
                let phaseName = 'New Moon';
                if (phase > 0.05 && phase < 0.20) phaseName = 'Waxing Crescent';
                else if (phase >= 0.20 && phase < 0.30) phaseName = 'First Quarter';
                else if (phase >= 0.30 && phase < 0.45) phaseName = 'Waxing Gibbous';
                else if (phase >= 0.45 && phase < 0.55) phaseName = 'Full Moon';
                else if (phase >= 0.55 && phase < 0.70) phaseName = 'Waning Gibbous';
                else if (phase >= 0.70 && phase < 0.80) phaseName = 'Last Quarter';
                else if (phase >= 0.80 && phase < 0.95) phaseName = 'Waning Crescent';

                cachedData.moonPhase = {
                    phaseName: phaseName,
                    illumination: (moonIllumination.fraction * 100).toFixed(1),
                    distance: SunCalc.getMoonPosition(now, lat, lon).distance.toFixed(0)
                };
            }

            /**
             * Calculates the dates of the next new and full moons.
             */
            function calculateLunarEvents() {
                let events = { nextFullMoon: null, nextNewMoon: null };
                let date = new Date();
                for(let i=0; i<60; i++) { // Search up to 60 days ahead
                    date.setDate(date.getDate() + 1);
                    const illumination = SunCalc.getMoonIllumination(date);
                    if (!events.nextNewMoon && illumination.phase < 0.02) {
                        events.nextNewMoon = new Date(date);
                    }
                    if (!events.nextFullMoon && illumination.phase > 0.48 && illumination.phase < 0.52) {
                        events.nextFullMoon = new Date(date);
                    }
                    if(events.nextNewMoon && events.nextFullMoon) break;
                }
                cachedData.lunarEvents = events;
            }

            // --- INITIALIZATION ---
            function init() {
                document.getElementById('overview-section').classList.remove('hidden');
                // FOR VERIFICATION: useMockData();
                // FOR PRODUCTION: getLocation();
                getLocation();
            }

            init();
        });
    </script>
